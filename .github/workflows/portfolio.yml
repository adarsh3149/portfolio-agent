name: Daily Portfolio Report

on:
  schedule:
    - cron: "30 15 * * *"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt

      - name: ▶️ Run script
        env:
          EMAIL: ${{ secrets.EMAIL }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          IMAP_SERVER: imap.gmail.com
          USE_AI: false
        run: |
          python main.py

      - name: ❌ Send Failure Alert Email
        if: failure()
        env:
          EMAIL: ${{ secrets.EMAIL }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        run: |
          python - <<EOF
          import smtplib
          from email.mime.text import MIMEText
          import os

          EMAIL = os.environ["EMAIL"]
          APP_PASSWORD = os.environ["APP_PASSWORD"]

          msg = MIMEText("🚨 Portfolio Agent FAILED!\n\nCheck GitHub Actions logs immediately.")
          msg["Subject"] = "🚨 Portfolio Agent Failure Alert"
          msg["From"] = EMAIL
          msg["To"] = EMAIL

          with smtplib.SMTP("smtp.gmail.com", 587) as server:
              server.starttls()
              server.login(EMAIL, APP_PASSWORD)
              server.send_message(msg)

          print("Failure alert sent!")
          EOF